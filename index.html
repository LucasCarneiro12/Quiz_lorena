<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Momento | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm">
            <h2>Bem-vinda, Amor</h2>
            <p>Identifique-se para continuar:</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Quem é o amor da minha vida?" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Nossa data (DDMM)" required>
            </div>
            
            <button type="submit">Entrar no nosso mundo</button>
            <p id="message" class="error-msg"></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
